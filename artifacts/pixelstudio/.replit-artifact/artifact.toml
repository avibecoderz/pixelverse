kind = "web"
previewPath = "/"
title = "PixelStudio"
version = "1.0.0"
id = "artifacts/pixelstudio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21502
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/pixelstudio run dev"

[services.env]
PORT = "21502"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/pixelstudio", "run", "build"]
publicDir = "artifacts/pixelstudio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
